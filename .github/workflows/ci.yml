name: CI

on:
  pull_request:
    branches:
      - main
      - development
      - devel
      - stage
  push:
    branches:
      - main
      - development
      - devel
      - stage

jobs:
  app:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
