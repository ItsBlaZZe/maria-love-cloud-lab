name: Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - stage

env:
  IMAGE_NAME: maria-love-cloud-lab
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect registry credentials
        id: registry
        run: |
          if [ -n "${ACR_LOGIN_SERVER}" ] && [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ]; then
            echo "push_enabled=true" >> "$GITHUB_OUTPUT"
            echo "image=${ACR_LOGIN_SERVER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
            echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
            echo "ACR secrets are not configured. Building locally in CI without pushing."
          fi

      - name: Log in to Azure Container Registry
        if: steps.registry.outputs.push_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build image without push
        if: steps.registry.outputs.push_enabled != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ steps.registry.outputs.image }}:${{ github.sha }}

      - name: Build and push image
        if: steps.registry.outputs.push_enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.registry.outputs.image }}:${{ github.sha }}
            ${{ steps.registry.outputs.image }}:latest

      - name: ACR adaptation note
        run: |
          echo "Set ACR_LOGIN_SERVER, ACR_USERNAME, and ACR_PASSWORD as GitHub Actions secrets to push images to Azure Container Registry."
